name: Java CI/CD Multi-OS (JDK 17)

on:
  push:
    branches: [ "main", "dev" ]
    tags: 
      - 'v*.*.*' # Chạy khi bạn push tag dạng v1.0.0, v2.1.0...
    paths:
      - 'src/main/java/**'
      - 'src/main/resources/views/**'
  pull_request:
    branches: [ "main", "dev", "master" ]
    paths:
      - 'src/main/java/**'
      - 'src/main/resources/views/**'
  workflow_dispatch:

permissions:
  contents: write # Cấp quyền ghi để tạo Release và upload file

jobs:
  # --- JOB 1: BUILD VÀ TEST (CI) ---
  build-and-test:
    strategy:
      matrix:
        # Chạy trên cả 3 hệ điều hành để đảm bảo tính tương thích của JavaFX
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # Chỉ chạy Checkstyle trên máy Ubuntu để tiết kiệm thời gian
    - name: Run Checkstyle
      if: matrix.os == 'ubuntu-latest'
      run: mvn checkstyle:check

    # Biên dịch và chạy Unit Test trên từng hệ điều hành
    - name: Build and Test with Maven
      run: mvn clean package

    # Báo cáo kết quả test lên giao diện GitHub (Chỉ chạy trên Ubuntu)
    - name: Publish Test Report
      uses: mikepenz/action-junit-report@v4
      if: (success() || failure()) && matrix.os == 'ubuntu-latest'
      with:
        report_paths: '**/target/surefire-reports/TEST-*.xml'

    # Lưu file JAR vào hệ thống Artifact của GitHub (Tải được trong mục Actions)
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: auction-app-${{ matrix.os }}
        path: target/*.jar
        retention-days: 5

  # --- JOB 2: TẠO RELEASE VÀ UPLOAD FILE (CD) ---
  # Job này chỉ chạy khi bạn push một TAG
  release:
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Tạo bản Release trên GitHub
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ github.ref_name }}"
          body: |
            ## Bản cập nhật Auction System mới
            - Phiên bản: ${{ github.ref_name }}
            - Được build tự động cho Windows, macOS và Ubuntu.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Tải các file JAR đã build từ Job 1 xuống để chuẩn bị upload lên Release
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./all-artifacts

      # Đưa các file JAR vào trang Release
      - name: Upload Binaries to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./all-artifacts/auction-app-windows-latest/*.jar
            ./all-artifacts/auction-app-macos-latest/*.jar
            ./all-artifacts/auction-app-ubuntu-latest/*.jar
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

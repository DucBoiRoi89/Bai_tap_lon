name: Java CI/CD Multi-OS (JDK 17)

on:
  push:
    branches: [ "main", "dev", "master" ]
    tags: 
      - 'v*.*.*'
    paths:
      - 'AuctionSystem/src/main/java/**'
      - 'AuctionSystem/src/main/resources/views/**'
  pull_request:
    branches: [ "main", "dev", "master" ]
    paths:
      - 'AuctionSystem/src/main/java/**'
      - 'AuctionSystem/src/main/resources/views/**'
  workflow_dispatch:

permissions:
  contents: write
  checks: write      # Thêm quyền này để sửa lỗi Publish Test Report
  pull-requests: write

jobs:
  # --- JOB 1: BUILD VÀ TEST (CI) ---
  build-and-test:
    strategy:
      fail-fast: false # Giúp các OS khác vẫn chạy tiếp nếu 1 cái bị lỗi
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # Chạy Checkstyle (Phải chỉ định thư mục làm việc)
    - name: Run Checkstyle
      if: matrix.os == 'ubuntu-latest'
      working-directory: AuctionSystem
      run: mvn checkstyle:check

    # Biên dịch và Test (Phải chỉ định thư mục làm việc)
    - name: Build and Test with Maven
      working-directory: AuctionSystem
      run: mvn clean package

    # Báo cáo kết quả test (Sửa đường dẫn trỏ vào thư mục AuctionSystem)
    - name: Publish Test Report
      uses: mikepenz/action-junit-report@v4
      if: (success() || failure()) && matrix.os == 'ubuntu-latest'
      with:
        report_paths: 'AuctionSystem/target/surefire-reports/TEST-*.xml'

    # Lưu file JAR (Sửa đường dẫn trỏ vào thư mục AuctionSystem)
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: auction-app-${{ matrix.os }}
        path: AuctionSystem/target/*.jar
        retention-days: 5

  # --- JOB 2: TẠO RELEASE VÀ UPLOAD FILE (CD) ---
  release:
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ github.ref_name }}"
          body: |
            ## Bản cập nhật Auction System mới
            - Phiên bản: ${{ github.ref_name }}
            - Được build tự động cho Windows, macOS và Ubuntu.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./all-artifacts

      - name: Upload Binaries to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./all-artifacts/auction-app-windows-latest/*.jar
            ./all-artifacts/auction-app-macos-latest/*.jar
            ./all-artifacts/auction-app-ubuntu-latest/*.jar
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
